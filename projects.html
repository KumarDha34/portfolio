<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | Kumar Dhamala</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            transition: background-color 0.3s ease;
        }
        
        body.dark {
            background-color: #111827;
        }
        
        /* ========== NAVBAR FIX ========== */
        .navbar {
            background-color: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
            padding: 15px 0;
            position: fixed !important;
            top: 0 !important;
            width: 100% !important;
            z-index: 9999 !important;
        }
        
        body.dark .navbar {
            background-color: rgba(31, 41, 55, 0.95) !important;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.3);
        }
        
        .navbar-brand {
            font-size: 1.8rem;
            font-weight: 700;
            text-decoration: none;
            color: #1f2937 !important;
        }
        
        body.dark .navbar-brand {
            color: #f9fafb !important;
        }
        
        .navbar-brand span:first-child {
            color: #2563eb !important;
        }
        
        .nav-link {
            color: #4b5563 !important;
            font-weight: 500;
            transition: color 0.3s ease;
            padding: 8px 16px !important;
        }
        
        body.dark .nav-link {
            color: #9ca3af !important;
        }
        
        .nav-link:hover {
            color: #2563eb !important;
        }
        
        .nav-link.active {
            color: #2563eb !important;
            font-weight: 600;
        }
        
        .navbar-toggler {
            border: 1px solid #d1d5db !important;
            background: transparent !important;
        }
        
        .navbar-toggler:focus {
            box-shadow: none !important;
            outline: none !important;
        }
        
        /* Dark mode toggle button */
        #darkModeToggle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid #d1d5db;
            background: transparent;
            transition: all 0.3s ease;
        }
        
        #darkModeToggle:hover {
            background-color: #f3f4f6;
            transform: scale(1.05);
        }
        
        body.dark #darkModeToggle {
            border-color: #4b5563;
            color: #f9fafb;
        }
        
        body.dark #darkModeToggle:hover {
            background-color: #374151;
        }
        
        /* Page Header */
        .page-header {
            padding-top: 120px;
            padding-bottom: 60px;
            background: linear-gradient(135deg, #eff6ff 0%, #ffffff 100%);
            text-align: center;
        }
        
        body.dark .page-header {
            background: linear-gradient(135deg, #111827 0%, #1f2937 100%);
        }
        
        .page-title {
            font-size: 3rem;
            font-weight: 800;
            color: #111827;
            margin-bottom: 16px;
        }
        
        body.dark .page-title {
            color: #f9fafb;
        }
        
        .page-subtitle {
            color: #6b7280;
            font-size: 1.125rem;
        }
        
        body.dark .page-subtitle {
            color: #9ca3af;
        }
        
        .title-underline {
            width: 80px;
            height: 4px;
            background-color: #2563eb;
            margin: 20px auto 0;
            border-radius: 2px;
        }
        
        /* Filter Buttons */
        .filter-btn {
            padding: 8px 24px;
            border-radius: 9999px;
            border: none;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
            background-color: #f3f4f6;
            color: #4b5563;
        }
        
        body.dark .filter-btn {
            background-color: #374151;
            color: #9ca3af;
        }
        
        .filter-btn.active {
            background-color: #2563eb !important;
            color: white !important;
        }
        
        .filter-btn:hover {
            transform: translateY(-2px);
        }
        
        /* Project Cards with Images */
        .project-card {
            background-color: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }
        
        body.dark .project-card {
            background-color: #1f2937;
        }
        
        .project-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15);
        }
        
        /* Project Image Container */
        .project-image-container {
            position: relative;
            height: 220px;
            overflow: hidden;
            background: linear-gradient(135deg, #2563eb, #8b5cf6);
        }
        
        .project-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        
        .project-card:hover .project-image {
            transform: scale(1.05);
        }
        
        /* Fallback icon when image fails */
        .fallback-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            color: rgba(255, 255, 255, 0.8);
            z-index: 1;
            pointer-events: none;
        }
        
        .project-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            padding: 16px;
            z-index: 2;
        }
        
        .overlay-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: white;
            margin-right: 8px;
        }
        
        .project-content {
            padding: 20px;
        }
        
        .project-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 10px;
        }
        
        body.dark .project-title {
            color: #f9fafb;
        }
        
        .project-description {
            color: #6b7280;
            font-size: 0.875rem;
            line-height: 1.5;
            margin-bottom: 16px;
        }
        
        body.dark .project-description {
            color: #9ca3af;
        }
        
        .tech-badge {
            display: inline-block;
            background-color: #f3f4f6;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.7rem;
            margin-right: 6px;
            margin-bottom: 8px;
        }
        
        body.dark .tech-badge {
            background-color: #374151;
            color: #d1d5db;
        }
        
        .github-link {
            color: #2563eb;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            transition: gap 0.3s ease;
        }
        
        .github-link:hover {
            gap: 10px;
            text-decoration: underline;
        }
        
        body.dark .github-link {
            color: #60a5fa;
        }
        
        /* Grid Layout */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }
        
        .container-custom {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* Footer */
        .footer {
            background-color: #111827;
            color: #9ca3af;
            padding: 48px 0;
            text-align: center;
            margin-top: 80px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .page-title {
                font-size: 2rem;
            }
            .projects-grid {
                grid-template-columns: 1fr;
            }
            .navbar-collapse {
                background-color: white;
                padding: 20px;
                border-radius: 12px;
                margin-top: 10px;
            }
            body.dark .navbar-collapse {
                background-color: #1f2937;
            }
            .nav-link {
                padding: 10px 0 !important;
            }
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        
        body.dark ::-webkit-scrollbar-track {
            background: #1f2937;
        }
        
        body.dark ::-webkit-scrollbar-thumb {
            background: #4b5563;
        }
    </style>
</head>
<body>

<!-- Navigation Bar -->
<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand" href="index.html">
            <span>Kumar</span><span>Dhamala</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-2">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link active" href="projects.html">Projects</a></li>
                <li class="nav-item"><a class="nav-link" href="resume.html">Resume</a></li>

            <button id="darkModeToggle" class="btn ms-3">
                <i class="fas fa-moon"></i>
            </button>
        </div>

</nav>

<!-- Page Header -->
<section class="page-header">
    <div class="container">
        <h1 class="page-title" data-aos="fade-up">My Projects</h1>
        <p class="page-subtitle" data-aos="fade-up" data-aos-delay="100">Django | Python | Backend Developer</p>
        <div class="title-underline" data-aos="fade-up" data-aos-delay="200"></div>
    </div>
</section>

<!-- Projects Section -->
<section style="padding: 60px 0;">
    <div class="container">
        <!-- Filter Buttons -->
        <div class="text-center mb-5" data-aos="fade-up">
            <div class="d-flex flex-wrap justify-content-center gap-3">
                <button class="filter-btn active" data-filter="all">All Projects</button>
                <button class="filter-btn" data-filter="django"><i class="fab fa-python me-1"></i> Django</button>
                <button class="filter-btn" data-filter="api"><i class="fas fa-plug me-1"></i> API / AI</button>
            </div>
        </div>
        
        <!-- Projects Grid -->
        <div class="projects-grid" id="projectsGrid">
            <!-- Projects loaded via JavaScript -->
        </div>
    </div>
</section>

<!-- Footer -->
<footer class="footer">
    <div class="container">
        <h3 style="color: white; font-size: 1.5rem; margin-bottom: 8px;">Kumar Dhamala</h3>
        <p style="margin-bottom: 20px;">Python | Django | FastAPI Developer</p>
        <div class="d-flex justify-content-center gap-4 mb-4">
            <a href="https://github.com/KumarDha34" target="_blank" style="color: #9ca3af; font-size: 1.25rem;"><i class="fab fa-github"></i></a>
            <a href="mailto:dhamalakumar834@gmail.com" style="color: #9ca3af; font-size: 1.25rem;"><i class="fas fa-envelope"></i></a>
        </div>
        <div style="border-top: 1px solid #1f2937; padding-top: 24px;">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init({ once: true, duration: 800 });
    
    // Projects Data with Image Paths
    const projects = [
        { 
            id: 1, 
            title: 'Online BookStore', 
            description: 'Django-based e-commerce platform with user authentication, shopping cart, wishlist, order management, review system, and ML-based book recommendations using Matrix Factorization. Integrated eSewa payment gateway.', 
            tech: ['Django', 'PostgreSQL', 'Bootstrap', 'ML', 'eSewa'], 
            category: 'django', 
            icon: 'fa-book-open',
            image: 'assets/images/bookstore.avif',
            gradient: 'linear-gradient(135deg, #2563eb, #8b5cf6)',
            github: 'https://github.com/KumarDha34/BookStore' 
        },
        { 
            id: 2, 
            title: 'Task Flow Project', 
            description: 'Django task management application with user accounts, task creation, editing, deletion, and report generation. Clean and intuitive interface for productivity tracking.', 
            tech: ['Django', 'SQLite', 'HTML/CSS', 'Reports'], 
            category: 'django', 
            icon: 'fa-tasks',
            image: 'assets/images/task.avif',
            gradient: 'linear-gradient(135deg, #10b981, #14b8a6)',
            github: 'https://github.com/KumarDha34/Task-Flow-Project' 
        },
        { 
            id: 3, 
            title: 'Recipe System Django', 
            description: 'Full-featured recipe management system with CRUD operations, user authentication, recipe images, search functionality, and responsive UI using Bootstrap.', 
            tech: ['Django', 'SQLite', 'Bootstrap', 'CRUD'], 
            category: 'django', 
            icon: 'fa-utensils',
            image: 'assets/images/recipe.avif',
            gradient: 'linear-gradient(135deg, #f97316, #ef4444)',
            github: 'https://github.com/KumarDha34/Recipe_System_Django' 
        },
        { 
            id: 4, 
            title: 'AI Chatbot', 
            description: 'Production-ready AI chatbot built with FastAPI, PostgreSQL, and Google Gemini AI. Features JWT authentication, chat history storage, conversation management, and context-aware responses.', 
            tech: ['FastAPI', 'PostgreSQL', 'Google Gemini', 'JWT'], 
            category: 'api', 
            icon: 'fa-robot',
            image: 'assets/images/chatbot.avif',
            gradient: 'linear-gradient(135deg, #ec4899, #f43f5e)',
            github: 'https://github.com/KumarDha34/ai-chatbot' 
        }
    ];
    
    function renderProjects(filter = 'all') {
        const grid = document.getElementById('projectsGrid');
        if (!grid) return;
        
        let filtered = filter === 'all' ? projects : projects.filter(p => p.category === filter);
        
        if (filtered.length === 0) {
            grid.innerHTML = '<div class="text-center" style="grid-column: 1/-1; padding: 60px;"><p style="color: #6b7280;">No projects found in this category.</p></div>';
            return;
        }
        
        grid.innerHTML = filtered.map(p => `
            <div class="project-card" data-aos="fade-up">
                <div class="project-image-container" style="background: ${p.gradient};" id="img-container-${p.id}">
                    <i class="fas ${p.icon} fallback-icon"></i>
                    <img src="${p.image}" alt="${p.title}" class="project-image" loading="lazy"
                         onerror="this.style.display='none'; document.getElementById('img-container-${p.id}').style.background='${p.gradient}';">
                    <div class="project-overlay">
                        <span class="overlay-badge">${p.tech[0]}</span>
                        <span class="overlay-badge">${p.tech[1]}</span>
                    </div>
                </div>
                <div class="project-content">
                    <h3 class="project-title">${p.title}</h3>
                    <p class="project-description">${p.description}</p>
                    <div>
                        ${p.tech.map(t => `<span class="tech-badge">${t}</span>`).join('')}
                    </div>
                    <a href="${p.github}" target="_blank" class="github-link">View on GitHub <i class="fas fa-arrow-right"></i></a>
                </div>
            </div>
        `).join('');
    }
    
    // Filter buttons functionality
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            renderProjects(this.getAttribute('data-filter'));
        });
    });
    
    // Dark mode functionality
    const toggle = document.getElementById('darkModeToggle');
    if (toggle) {
        const saved = localStorage.getItem('theme');
        if (saved === 'dark') {
            document.body.classList.add('dark');
            toggle.innerHTML = '<i class="fas fa-sun"></i>';
        }
        
        toggle.addEventListener('click', () => {
            if (document.body.classList.contains('dark')) {
                document.body.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                toggle.innerHTML = '<i class="fas fa-moon"></i>';
            } else {
                document.body.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                toggle.innerHTML = '<i class="fas fa-sun"></i>';
            }
        });
    }
    
    // Initial render
    renderProjects('all');
</script>
</body>
</html>
